name: Publish crates.io package

on:
  pull_request:
    paths:
      - ".github/workflows/publish-crates.yml"
      - "Cargo.toml"
      - "Cargo.lock"
      - "src/**"
      - "tests/**"
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to crates.io. Must be run from a v*.*.* tag ref."
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: crates-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package-check:
    name: Package validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Run tests
        run: cargo test --locked

      - name: Verify package contents
        run: cargo package --locked

  publish-dry-run:
    name: Publish action dry run
    runs-on: ubuntu-latest
    needs: package-check
    if: ${{ github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && !inputs.publish) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Exercise publish-crates without secrets
        uses: katyo/publish-crates@02cc2f1ad653fb25c7d1ff9eb590a8a50d06186b
        with:
          dry-run: true
          args: --locked
          check-repo: true
          ignore-unpublished-changes: true

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: package-check
    environment: crates-io
    if: ${{ startsWith(github.ref, 'refs/tags/v') && (github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        run: rustup toolchain install stable --profile minimal

      - name: Verify crates.io token is configured
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: test -n "$CARGO_REGISTRY_TOKEN"

      - name: Publish crate
        uses: katyo/publish-crates@02cc2f1ad653fb25c7d1ff9eb590a8a50d06186b
        with:
          registry-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          args: --locked
          check-repo: true
          ignore-unpublished-changes: true
